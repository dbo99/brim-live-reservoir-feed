name: Build CoCoRaHS daily precip GeoJSON

on:
  workflow_dispatch:
  schedule:
    # Every 8 hours. GitHub schedules are UTC and may not run exactly on the minute.
    # 16:37 UTC is roughly morning California time, when many daily reports are available.
    - cron: "37 0,8,16 * * *"

permissions:
  contents: write

jobs:
  build-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(
            c("curl", "jsonlite", "lubridate", "tibble", "dplyr", "purrr", "readr"),
            repos = "https://cloud.r-project.org"
          )

      - name: Build latest CoCoRaHS daily precip GeoJSON
        shell: Rscript {0}
        run: |
          source("scripts/build_cocorahs_daily_precip_latest.R")

      - name: Commit updated feed files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/cocorahs_daily_precip_latest.geojson docs/data/cocorahs_daily_precip_latest_summary.json
          if git diff --cached --quiet; then
            echo "No CoCoRaHS feed changes to commit."
          else
            git commit -m "Update CoCoRaHS daily precip feed"
            git push
          fi
