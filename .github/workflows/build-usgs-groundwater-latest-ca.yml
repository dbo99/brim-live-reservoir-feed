name: Build USGS CA groundwater latest GeoJSON

on:
  workflow_dispatch:
  schedule:
    # Daily. Groundwater field measurements are low-frequency site-visit data,
    # so a daily refresh is sufficient for BRIM Ops Live.
    - cron: "41 13 * * *"

permissions:
  contents: write

concurrency:
  group: live-data-feed-writes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install Linux system libraries
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends             libcurl4-openssl-dev             libssl-dev             libxml2-dev             libudunits2-dev             libgdal-dev             libgeos-dev             libproj-dev

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: usgs-groundwater-v1
          packages: |
            any::dataRetrieval
            any::dplyr
            any::readr
            any::lubridate
            any::jsonlite
            any::tibble
            any::purrr
            any::curl

      - name: Build latest USGS CA groundwater GeoJSON
        shell: Rscript {0}
        env:
          USGS_GW_FIELD_MEASUREMENTS_LOOKBACK_DAYS: "450"
          USGS_GW_MIN_API_SITES_TO_PUBLISH: "300"
          USGS_GW_MIN_FEATURES_TO_PUBLISH: "300"
          USGS_GW_ALLOW_INDEX_FALLBACK: "true"
          # Optional: create this repository secret for higher USGS Water Data API rate limits.
          API_USGS_PAT: ${{ secrets.API_USGS_PAT }}
        run: |
          source("scripts/build_usgs_groundwater_latest_ca.R")

      - name: Commit updated feed files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add             docs/data/usgs_groundwater_latest_ca.geojson             docs/data/usgs_groundwater_latest_ca_summary.json
          if git diff --cached --quiet; then
            echo "No USGS groundwater feed changes to commit."
          else
            git commit -m "Update USGS CA groundwater latest feed"
            git pull --rebase origin main
            git push
          fi
