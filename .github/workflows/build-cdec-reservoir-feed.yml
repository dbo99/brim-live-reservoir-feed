name: Build CDEC reservoir latest GeoJSON

on:
  workflow_dispatch:
  schedule:
    # Every 3 hours. GitHub schedules are UTC and may not run exactly on the minute.
    - cron: "17 */3 * * *"

permissions:
  contents: write

concurrency:
  group: live-data-feed-writes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install Linux system libraries
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: cdec-reservoir-v2-curl
          packages: |
            any::curl
            any::dplyr
            any::readr
            any::stringr
            any::lubridate
            any::jsonlite
            any::tibble
            any::purrr

      - name: Build latest CDEC reservoir GeoJSON
        shell: Rscript {0}
        run: |
          source("scripts/build_cdec_reservoir_latest.R")

      - name: Commit updated feed files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/data/cdec_reservoir_latest.geojson \
            docs/data/cdec_reservoir_latest_summary.json
          if git diff --cached --quiet; then
            echo "No CDEC reservoir feed changes to commit."
          else
            git commit -m "Update CDEC reservoir feed"
            git pull --rebase origin main
            git push
          fi
