name: Build CDEC reservoir latest GeoJSON

on:
  workflow_dispatch:
  schedule:
    # Every 3 hours. GitHub schedules are UTC and may not run exactly on the minute.
    - cron: "17 */3 * * *"

permissions:
  contents: write

jobs:
  build-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(
            c("curl", "dplyr", "readr", "stringr", "lubridate", "jsonlite", "tibble", "purrr"),
            repos = "https://cloud.r-project.org"
          )

      - name: Build latest CDEC reservoir GeoJSON
        shell: Rscript {0}
        run: |
          source("scripts/build_cdec_reservoir_latest.R")

      - name: Commit updated feed files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/cdec_reservoir_latest.geojson docs/data/cdec_reservoir_latest_summary.json
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "Update CDEC reservoir latest feed"
            git push
          fi
