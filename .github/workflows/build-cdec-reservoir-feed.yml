name: Build CDEC reservoir feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

permissions:
  contents: write

concurrency:
  group: cdec-reservoir-feed
  cancel-in-progress: true

jobs:
  build-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(
            c("curl", "dplyr", "readr", "stringr", "lubridate", "jsonlite", "tibble", "purrr"),
            repos = "https://cloud.r-project.org"
          )

      - name: Build CDEC reservoir latest GeoJSON
        run: Rscript scripts/build_cdec_reservoir_latest.R

      - name: Commit updated feed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/cdec_reservoir_latest.geojson docs/data/cdec_reservoir_latest_summary.json

          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "Update CDEC reservoir feed"
            git push
          fi
